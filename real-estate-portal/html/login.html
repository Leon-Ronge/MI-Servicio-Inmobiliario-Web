<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Autogestión - MI Servicio Inmobiliario">
    <link rel="icon" href="../LogoInmob.png" type="image/png">
    <title>Login | MI Servicio Inmobiliario</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        /* Login Specific Styles */
        body.login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-color: var(--bg-light);
            margin: 0;
            padding: 20px;
        }

        .login-card {
            background-color: var(--white);
            padding: 40px 50px;
            width: 100%;
            max-width: 420px;
            border-radius: var(--border-radius-lg);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .login-card .logo-container {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .login-card .logo-container img {
            height: 60px;
            width: auto;
        }

        .login-card .logo-container h1 {
            font-size: 1.5rem;
            color: var(--text-dark);
            margin: 0;
        }

        .login-card .logo-container h1 span {
            color: var(--primary-color);
            font-weight: 700;
        }

        .login-card .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .login-form .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .login-form .input-group i:first-child {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            pointer-events: none;
        }

        .login-form .input-field {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
            transition: var(--transition-fast);
            background-color: #f9f9f9;
        }

        .login-form .input-group input[type="password"] {
            padding-right: 45px;
        }

        .login-form .input-field:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(255, 68, 0, 0.1);
        }

        .login-form .input-field::placeholder {
            color: #a0a0a0;
        }

        .login-form .forgot-password {
            display: block;
            text-align: right;
            margin-top: -10px;
            margin-bottom: 30px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition-fast);
        }

        .login-form .forgot-password:hover {
            color: var(--primary-color);
        }

        .login-form .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .login-form .btn-container .btn {
            font-family: 'Poppins', sans-serif;
        }

        .login-form .btn-container .btn {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            justify-content: center;
        }

        .login-form .back-link {
            color: var(--text-muted);
            background: transparent;
            border: 1px solid var(--border-color);
        }

        .login-form .back-link:hover {
            background-color: #f5f5f5;
            color: var(--text-dark);
        }

        .login-form .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            transition: var(--transition-fast);
            left: auto;
            /* Override left instruction from generic i tag */
            pointer-events: auto;
            /* Ensure it is clickable */
        }

        .login-form .toggle-password:hover {
            color: var(--primary-color);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body class="login-page">

    <div class="login-card">
        <div class="logo-container">
            <img src="../LogoInmob.png" alt="MI Servicio Inmobiliario">
            <h1>MI <span>Servicio Inmobiliario</span></h1>
        </div>

        <p class="subtitle">Ingresa a tu portal de autogestión</p>

        <form id="login-form" class="login-form">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="documento" class="input-field" placeholder="Usuario / Documento">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" class="input-field" placeholder="Contraseña">
                <i class="fa-regular fa-eye toggle-password" id="togglePassword" title="Mostrar contraseña"></i>
            </div>

            <a href="#" class="forgot-password">¿Olvidó su contraseña?</a>

            <p id="login-error"
                style="color: #ff4500; font-size: 0.85rem; text-align: left; margin-top: -20px; margin-bottom: 20px; display: none;">
                Usuario o contraseña incorrectos.</p>

            <div class="btn-container">

                <button type="submit" class="btn btn-primary" title="Ingresar a autogestión"
                    style="display: inline-flex; align-items: center; justify-content: center; width: 100%; border: none; cursor: pointer;">Ingresar</button>
                <a href="index.html" class="btn back-link" title="Regresar a la página principal">Volver al
                    inicio</a>
            </div>
        </form>
    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');

        // Toggle Password Visibility
        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Form Submit Handler
        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const usr = document.getElementById('documento').value.trim();
            const pwd = password.value.trim();

            if (usr === 'leon' && pwd === '123') {
                window.location.href = 'DashboardCliente.html';
            } else if (usr === 'mariela' && pwd === '123') {
                window.location.href = 'DashboardAdmin.html';
            } else {
                loginError.style.display = 'block';
            }
        });
    </script>
</body>

</html>

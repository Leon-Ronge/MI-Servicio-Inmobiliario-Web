<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Autogestión - MI Servicio Inmobiliario">
    <link rel="icon" href="LogoInmob.png" type="image/png">
    <title>Login | MI Servicio Inmobiliario</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Login Specific Styles */
        body.login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-color: var(--bg-light);
            margin: 0;
            padding: 20px;
        }

        .login-card {
            background-color: var(--white);
            padding: 40px 50px;
            width: 100%;
            max-width: 420px;
            border-radius: var(--border-radius-lg);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .login-card .logo-container {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .login-card .logo-container img {
            height: 60px;
            width: auto;
        }

        .login-card .logo-container h1 {
            font-size: 1.5rem;
            color: var(--text-dark);
            margin: 0;
        }

        .login-card .logo-container h1 span {
            color: var(--primary-color);
            font-weight: 700;
        }

        .login-card .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .login-form .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .login-form .input-group i:first-child {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            pointer-events: none;
        }

        .login-form .input-field {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
            transition: var(--transition-fast);
            background-color: #f9f9f9;
        }

        .login-form .input-group input[type="password"] {
            padding-right: 45px;
        }

        .login-form .input-field:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(255, 68, 0, 0.1);
        }

        .login-form .input-field::placeholder {
            color: #a0a0a0;
        }

        .login-form .forgot-password {
            display: block;
            text-align: right;
            margin-top: -10px;
            margin-bottom: 30px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition-fast);
        }

        .login-form .forgot-password:hover {
            color: var(--primary-color);
        }

        .login-form .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .login-form .btn-container .btn {
            font-family: 'Poppins', sans-serif;
        }

        .login-form .btn-container .btn {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            justify-content: center;
        }

        .login-form .back-link {
            color: var(--text-muted);
            background: transparent;
            border: 1px solid var(--border-color);
        }

        .login-form .back-link:hover {
            background-color: #f5f5f5;
            color: var(--text-dark);
        }

        .login-form .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            transition: var(--transition-fast);
            left: auto;
            /* Override left instruction from generic i tag */
            pointer-events: auto;
            /* Ensure it is clickable */
        }

        .login-form .toggle-password:hover {
            color: var(--primary-color);
        }

        .password-change-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .password-change-modal.active {
            display: flex;
        }

        .password-change-card {
            background-color: var(--white);
            padding: 40px 50px;
            width: 100%;
            max-width: 420px;
            border-radius: var(--border-radius-lg);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .password-change-card h2 {
            color: var(--text-dark);
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.3rem;
        }

        .password-change-card .subtitle {
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .password-change-form .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .password-change-form .input-group i:first-child {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            pointer-events: none;
        }

        .password-change-form .input-field {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
            transition: var(--transition-fast);
            background-color: #f9f9f9;
        }

        .password-change-form .input-field:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(255, 68, 0, 0.1);
        }

        .password-change-form .input-group .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            transition: var(--transition-fast);
            pointer-events: auto;
        }

        .password-change-form .input-group .toggle-password:hover {
            color: var(--primary-color);
        }

        #password-change-error {
            color: #ff4500;
            font-size: 0.85rem;
            text-align: left;
            margin-top: -20px;
            margin-bottom: 20px;
            display: none;
        }

        .password-change-form .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }

        .password-change-form .btn {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            border: none;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }

            .password-change-card {
                padding: 30px 20px;
                max-width: 90%;
            }
        }
    </style>
</head>

<body class="login-page">

    <div class="login-card">
        <div class="logo-container">
            <img src="LogoInmob.png" alt="MI Servicio Inmobiliario">
            <h1>MI <span>Servicio Inmobiliario</span></h1>
        </div>

        <p class="subtitle">Ingresa a tu portal de autogestión</p>

        <form id="login-form" class="login-form">
            <div class="input-group">
                <i class="fa-solid fa-id-card"></i>
                <input type="text" id="documento" class="input-field" placeholder="Ingresa tu DNI" maxlength="11">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" class="input-field" placeholder="Contraseña">
                <i class="fa-regular fa-eye toggle-password" title="Mostrar contraseña"></i>
            </div>

            <p id="login-error"
                style="color: #ff4500; font-size: 0.85rem; text-align: left; margin-top: -20px; margin-bottom: 20px; display: none;">
                DNI no encontrado. Verifica e intenta de nuevo.</p>

            <div class="btn-container">
                <button type="submit" class="btn btn-primary" title="Ingresar a autogestión"
                    style="display: inline-flex; align-items: center; justify-content: center; width: 100%; border: none; cursor: pointer;">Ingresar</button>
                <a href="index.html" class="btn back-link" title="Regresar a la página principal">Volver al
                    inicio</a>
                <button type="button" id="clear-storage-btn" class="btn back-link" title="Limpiar datos guardados" style="background-color: #fff3e0; color: #ff6b35; font-size: 0.85rem; padding: 8px;">Limpiar datos guardados</button>
            </div>
        </form>
    </div>

    <!-- Modal de Cambio de Contraseña -->
    <div id="password-change-modal" class="password-change-modal">
        <div class="password-change-card">
            <h2>Crear Contraseña</h2>
            <p class="subtitle">Es tu primer acceso. Por favor, crea una contraseña segura para tu cuenta.</p>

            <form id="password-change-form" class="password-change-form">
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="new-password" class="input-field" placeholder="Nueva contraseña" required>
                    <i class="fa-regular fa-eye toggle-password" title="Mostrar contraseña"></i>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="confirm-password" class="input-field" placeholder="Confirmar contraseña" required>
                    <i class="fa-regular fa-eye toggle-password" title="Mostrar contraseña"></i>
                </div>

                <p id="password-change-error"></p>

                <div class="btn-container">
                    <button type="submit" class="btn btn-primary" title="Guardar contraseña">Guardar contraseña</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Base de datos simulada de usuarios con DNI
        const usersDatabase = {
            '12345678': { nombre: 'Leon', role: 'cliente', dashboard: 'DashboardCliente.html' },
            '87654321': { nombre: 'Mariela', role: 'admin', dashboard: 'DashboardAdmin.html' }
        };

        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const passwordChangeModal = document.getElementById('password-change-modal');
        const passwordChangeForm = document.getElementById('password-change-form');
        const passwordChangeError = document.getElementById('password-change-error');
        let currentDNI = '';
        let currentUser = null;

        // Toggle Password Visibility - Login
        document.querySelectorAll('.login-form .toggle-password').forEach(toggle => {
            toggle.addEventListener('click', function (e) {
                const input = this.previousElementSibling;
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        });

        // Toggle Password Visibility - Password Change Modal
        document.querySelectorAll('.password-change-form .toggle-password').forEach(toggle => {
            toggle.addEventListener('click', function (e) {
                const input = this.previousElementSibling;
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        });

        // Form Submit Handler - DNI/Password Login
        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const dni = document.getElementById('documento').value.trim();
            const password = document.getElementById('password').value.trim();
            loginError.style.display = 'none';

            // Paso 1: Validar DNI
            if (!dni) {
                loginError.textContent = 'Por favor, ingresa tu DNI.';
                loginError.style.display = 'block';
                return;
            }

            // Verificar si el DNI existe en la base de datos
            if (!usersDatabase[dni]) {
                loginError.textContent = 'DNI no encontrado. Verifica e intenta de nuevo.';
                loginError.style.display = 'block';
                return;
            }

            // Validar que la contraseña no esté vacía
            if (!password) {
                loginError.textContent = 'Por favor, ingresa la contraseña.';
                loginError.style.display = 'block';
                return;
            }

            const user = usersDatabase[dni];
            const savedPassword = localStorage.getItem(`password_${dni}`);

            // Si es primer login (no hay contraseña guardada en localStorage)
            if (!savedPassword) {
                // Validar con contraseña = DNI
                if (password !== dni) {
                    loginError.textContent = 'Contraseña incorrecta. En el primer acceso usa tu DNI como contraseña.';
                    loginError.style.display = 'block';
                    return;
                }

                // Login exitoso con DNI:DNI, ahora mostrar modal para cambiar contraseña
                currentDNI = dni;
                currentUser = user;
                showPasswordChangeModal();
                return;
            }

            // Paso 2: Si ya tiene contraseña guardada, validarla
            if (password !== savedPassword) {
                loginError.textContent = 'Contraseña incorrecta. Intenta de nuevo.';
                loginError.style.display = 'block';
                return;
            }

            // Login exitoso
            window.location.href = user.dashboard;
        });

        // Show Password Change Modal
        function showPasswordChangeModal() {
            passwordChangeModal.classList.add('active');
            document.getElementById('new-password').focus();
        }

        // Handle Password Change Form
        passwordChangeForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value.trim();
            const confirmPassword = document.getElementById('confirm-password').value.trim();
            passwordChangeError.style.display = 'none';

            if (!newPassword || !confirmPassword) {
                passwordChangeError.textContent = 'Por favor, completa todos los campos.';
                passwordChangeError.style.display = 'block';
                return;
            }

            if (newPassword.length < 6) {
                passwordChangeError.textContent = 'La contraseña debe tener al menos 6 caracteres.';
                passwordChangeError.style.display = 'block';
                return;
            }

            if (newPassword !== confirmPassword) {
                passwordChangeError.textContent = 'Las contraseñas no coinciden.';
                passwordChangeError.style.display = 'block';
                return;
            }

            // Guardar contraseña en localStorage
            localStorage.setItem(`password_${currentDNI}`, newPassword);
            
            // Cerrar modal
            closePasswordChangeModal();
            
            // Redirigir al dashboard
            window.location.href = currentUser.dashboard;
        });

        // Close Password Change Modal
        function closePasswordChangeModal() {
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
            passwordChangeError.style.display = 'none';
            passwordChangeModal.classList.remove('active');
        }

        // Limpiar datos guardados del localStorage
        document.getElementById('clear-storage-btn').addEventListener('click', function() {
            localStorage.clear();
            alert('Datos guardados eliminados. Ahora puedes probar el primer acceso nuevamente.');
            document.getElementById('documento').value = '';
            document.getElementById('password').value = '';
            document.getElementById('documento').focus();
        });
    </script>
</body>

</html>
